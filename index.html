<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator Técnico OVMS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005599">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>Extrator Técnico OVMS</h1>
            <p>Processamento de Notas Técnicas e Laudos via Docling AI</p>
        </header>

        <main>
            <div class="card">
                <h3>Carregar Documento</h3>
                <form id="upload-form">
                    <div class="file-input-wrapper">
                        <input type="file" id="pdf-file" accept="application/pdf" required>
                    </div>
                    <button type="submit" id="submit-btn">Processar PDF</button>
                </form>
            </div>

            <div id="status-container" class="hidden">
                <div class="loader"></div>
                <p id="status-text">Enviando arquivo para o motor na nuvem...</p>
            </div>

            <div id="result-container" class="hidden">
                <div class="result-header">
                    <h3>Resultado da Extração (Markdown)</h3>
                    <button onclick="copyToClipboard()" class="btn-secondary">Copiar Texto</button>
                </div>
                <pre id="output-text"></pre>
            </div>
        </main>

        <footer>
            <p>Ferramenta de apoio técnico - Sabesp OVMS</p>
        </header>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado!'))
                    .catch(err => console.log('Erro ao registrar SW:', err));
            });
        }
    </script>
</body>
</html>
